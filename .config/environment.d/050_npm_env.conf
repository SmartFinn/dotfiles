NPM_CONFIG_INIT_MODULE="${XDG_CONFIG_HOME:-$HOME/.config}/npm/config/npm-init.js"
NPM_CONFIG_CACHE="${XDG_CACHE_HOME:-$HOME/.cache}/npm"
NPM_CONFIG_TMP="$XDG_RUNTIME_DIR/npm"
NPM_CONFIG_PREFIX="${XDG_DATA_HOME:-$HOME/.local/share}/npm"
NPM_CONFIG_USERCONFIG="${XDG_CONFIG_HOME:-$HOME/.config}/.config/npm/npmrc"

# Search executables in the new prefix
PATH="${XDG_DATA_HOME:-$HOME/.local/share}/npm/bin:$PATH"
